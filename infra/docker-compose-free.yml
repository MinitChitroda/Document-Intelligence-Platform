# infra/docker-compose-free.yml
#
# AWS Free Tier Deployment Stack for the Document Data Platform.
# Optimized to rely on external managed services (RDS, Qdrant Cloud, S3).
#

services:

  # ---------------------------------------------------------------------------
  # Kafka 3.8 — KRaft mode (no Zookeeper)
  # Memory Limit: 512 MB (Squeezed for Free Tier)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: ddp_kafka_free
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Heap limits scaled heavily down for Free Tier
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms256m"
    mem_limit: 512m
    memswap_limit: 512m
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 35s
    volumes:
      - kafka_data_free:/var/lib/kafka/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI Ingestion API
  # Memory Limit: 256 MB
  # ---------------------------------------------------------------------------
  fastapi:
    image: minitchitrooda/document-platform:latest
    container_name: ddp_fastapi_free
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - KAFKA_BROKER=kafka:29092
    command: uvicorn ingestion.api:app --host 0.0.0.0 --port 8000
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: 256m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Consumer Service
  # Memory Limit: 256 MB
  # ---------------------------------------------------------------------------
  kafka-consumer:
    image: minitchitrooda/document-platform:latest
    container_name: ddp_kafka_consumer_free
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - KAFKA_BROKER=kafka:29092
    command: python ingestion/kafka_consumer.py
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: 256m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # Memory Limit: 512 MB
  # ---------------------------------------------------------------------------
  streamlit:
    image: minitchitrooda/document-platform:latest
    container_name: ddp_streamlit_free
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - API_URL=http://fastapi:8000
    command: streamlit run dashboard/streamlit_app.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false
    depends_on:
      - fastapi
    mem_limit: 512m
    restart: unless-stopped

volumes:
  kafka_data_free:
    driver: local
