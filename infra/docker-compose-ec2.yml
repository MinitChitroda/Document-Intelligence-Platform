# infra/docker-compose-ec2.yml
#
# Production/EC2 Deployment Stack for the Document Data Platform.
# Optimized for a single t3.medium instance (4 GB RAM, 2 vCPUs).
#

services:

  # ---------------------------------------------------------------------------
  # Kafka 3.8 — KRaft mode (no Zookeeper)
  # Memory Limit: 1 GB
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    container_name: ddp_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      # Heap limits scaled for 1 GB container memory
      KAFKA_HEAP_OPTS: "-Xmx640m -Xms384m"
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 35s
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Postgres 15 — Database with Bronze + Gold tables
  # Memory Limit: 1 GB
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ddp_postgres
    hostname: postgres
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: document_platform
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    # Postgres configuration tuned for 1 GB container limit
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "max_connections=80"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    mem_limit: 1g
    memswap_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Qdrant — Self-hosted vector database
  # Memory Limit: 512 MB
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: ddp_qdrant
    hostname: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Airflow (LocalExecutor) — Orchestrator (hosting local Spark job)
  # Memory Limits: Webserver 1 GB, Scheduler 1.5 GB
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: ..
      dockerfile: infra/Dockerfile.airflow
    container_name: ddp_airflow_init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres@postgres:5432/document_platform
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

  airflow-webserver:
    build:
      context: ..
      dockerfile: infra/Dockerfile.airflow
    container_name: ddp_airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres@postgres:5432/document_platform
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/dags/ddp
    volumes:
      - ../:/opt/airflow/dags/ddp
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    mem_limit: 1g

  airflow-scheduler:
    build:
      context: ..
      dockerfile: infra/Dockerfile.airflow
    container_name: ddp_airflow_scheduler
    restart: unless-stopped
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres@postgres:5432/document_platform
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow/dags/ddp
      - DATABASE_URL=postgresql://postgres@postgres:5432/document_platform
    volumes:
      - ../:/opt/airflow/dags/ddp
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    # Scheduler memory includes overhead for running local PySpark processing jobs (max 1 GB configured in PySpark config)
    mem_limit: 1.5g

  # ---------------------------------------------------------------------------
  # FastAPI Ingestion API
  # Memory Limit: 256 MB
  # ---------------------------------------------------------------------------
  fastapi:
    image: python:3.11-slim
    container_name: ddp_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql://postgres@postgres:5432/document_platform
      - KAFKA_BROKER=kafka:29092
    command: bash -c "pip install --no-cache-dir -r requirements.txt && uvicorn ingestion.api:app --host 0.0.0.0 --port 8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    mem_limit: 256m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Consumer Service
  # Memory Limit: 256 MB
  # ---------------------------------------------------------------------------
  kafka-consumer:
    image: python:3.11-slim
    container_name: ddp_kafka_consumer
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - DATABASE_URL=postgresql://postgres@postgres:5432/document_platform
      - KAFKA_BROKER=kafka:29092
    command: bash -c "pip install --no-cache-dir -r requirements.txt && python ingestion/kafka_consumer.py"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    mem_limit: 256m
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # Memory Limit: 512 MB
  # ---------------------------------------------------------------------------
  streamlit:
    image: python:3.11-slim
    container_name: ddp_streamlit
    ports:
      - "8501:8501"
    volumes:
      - ..:/app
    working_dir: /app
    env_file: ../.env
    environment:
      - API_URL=http://fastapi:8000
    command: bash -c "pip install --no-cache-dir -r requirements.txt && streamlit run dashboard/streamlit_app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - fastapi
    mem_limit: 512m
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
